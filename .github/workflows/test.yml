name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  STRIPE_SECRET_KEY: sk_secret_key
  STRIPE_PUBLISHABLE_KEY: pk_pub_key
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_pub_key
  NEXT_PUBLIC_DEFAULT_COUNTRY: US
  APP_NAME: Pose
  PORT: 3000
  SECRET: S3cr3t

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 20
      - run: npm install --frozen-lockfile
      - run: npm run build
      - run: npm run lint
