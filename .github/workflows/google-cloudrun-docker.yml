name: 'Build and Deploy to Cloud Run'

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'What subdomain would you like to deploy to?'
        required: true
      environment:
        type: environment
        description: "Deployment type (Typically 'custom')"
      custom_env_file:
        type: string
        description: 'Paste your .env file (custom deployments only)'
      persistent:
        type: boolean
        description: 'Keep this demo active perpetually? (Not necessary for most demos)'

env:
  PROJECT_ID: 'stripe-sales-demos'
  REGION: 'us-central1'
  SERVICE: 'pose'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/764603794666/locations/global/workloadIdentityPools/github/providers/github-repo'

jobs:
  deploy:
    environment: ${{ github.event.inputs.environment }}
    runs-on: 'ubuntu-latest'
    env:
      ENV_FILE: ${{ secrets.ENV_FILE }}

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      # Configure Workload Identity Federation and generate an access token.
      #
      # See https://github.com/google-github-actions/auth for more options,
      # including authenticating via a JSON credentials file.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: 'Validating selected subdomain'
        if: env.ENV_FILE == '~CUSTOM-ENV~' && github.event.inputs.subdomain == 'pose'
        run: exit 1

      - name: 'Create custom .env file'
        if: env.ENV_FILE == '~CUSTOM-ENV~'
        run: |-
          touch .env
          echo "${{ github.event.inputs.custom_env_file }}" | tr ' ' '\n' > .env
          echo "NEXTAUTH_URL=${{ github.event.inputs.subdomain }}.stripedemos.com" >> .env

      - name: 'Create source of truth .env file'
        if: env.ENV_FILE != '~CUSTOM-ENV~'
        run: |-
          touch .env
          echo "${{ env.ENV_FILE }}" >> .env
          echo "NEXTAUTH_URL=${{ github.event.inputs.subdomain }}.stripedemos.com" >> .env

      - name: 'Build and Push Container'
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17' # google-github-actions/deploy-cloudrun@v2
        with:
          service: '${{ github.event.inputs.subdomain }}'
          region: '${{ env.REGION }}'
          project_id: '${{ env.PROJECT_ID }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ github.sha }}'
          revision_traffic: 'LATEST=100'
          labels: |-
            name=${{github.event.inputs.subdomain}}
            persistent=${{github.event.inputs.persistent}}

      - name: 'Making service public'
        run: |-
          gcloud run services add-iam-policy-binding ${{ github.event.inputs.subdomain }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --region="us-central1" \
            --project="stripe-sales-demos"

      - name: 'Show deployed domain'
        run: |2-
          echo ${{ steps.deploy.outputs.url }}
